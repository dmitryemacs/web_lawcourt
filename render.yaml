services:
  - type: web
    name: web-university
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: web-university-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: web-university-db
    databaseName: university
    plan: free
