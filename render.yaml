services:
  - type: web
    name: web-lawcourt
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: web_lawcourt-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: web_lawcourt-db
    databaseName: lawcourt
    plan: free
