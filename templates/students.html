{% extends "base.html" %}
{% block content %}
<div class="columns">
  <div class="column is-one-third">
    <div class="box">
      <h2 class="subtitle">Добавить студента</h2>
      <form method="post" action="/students/add">
        <div class="field">
          <label class="label">Имя</label>
          <div class="control"><input class="input" name="first_name" required/></div>
        </div>
        <div class="field">
          <label class="label">Фамилия</label>
          <div class="control"><input class="input" name="last_name" required/></div>
        </div>
        <div class="field">
          <label class="label">Email</label>
          <div class="control"><input class="input" name="email" /></div>
        </div>
        <div class="field">
          <label class="label">Group ID (optional)</label>
          <div class="control"><input class="input" name="group_id" type="number" /></div>
        </div>
        <div class="control"><button class="button is-primary" type="submit">Добавить</button></div>
      </form>
    </div>

    <div class="box">
      <h2 class="subtitle">Записать на курс</h2>
      <form method="post" action="/enroll">
        <div class="field">
          <label class="label">Студент</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select name="student_id" required>
                <option value="">-- выберите --</option>
                {% for s in students %}
                <option value="{{s.id}}">{{s.first_name}} {{s.last_name}}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label">Курс</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select name="course_id" required>
                <option value="">-- выберите --</option>
                {% for c in courses %}
                <option value="{{c.id}}">{{c.subject.title}} — {{c.semester}}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>
        <div class="control"><button class="button is-link" type="submit">Записать</button></div>
      </form>
    </div>
  </div>

  <div class="column">
    <div class="box">
      <h2 class="subtitle">Студенты</h2>
      <table class="table is-fullwidth is-striped">
        <thead><tr><th>#</th><th>Имя</th><th>Email</th><th>Group</th><th>Действия</th></tr></thead>
        <tbody>
          {% for s in students %}
          <tr>
            <td>{{s.id}}</td>
            <td>{{s.first_name}} {{s.last_name}}</td>
            <td>{{s.email or '-'}}</td>
            <td>{{s.group.name if s.group else '-'}}</td>
            <td>
              <a class="button is-small" href="/transcript/{{s.id}}">Транскрипт</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
