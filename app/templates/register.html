<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/modern.css">
  <style>
    .role-selector {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .role-card {
      flex: 1;
      cursor: pointer;
      transition: var(--transition);
      background: white;
      border-radius: var(--radius-lg);
      border: 2px solid var(--color-border);
      overflow: hidden;
    }
    .role-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
    }
    .role-card.selected {
      border-color: var(--color-primary);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      box-shadow: var(--shadow-md);
    }
    .role-card input[type="radio"] {
      display: none;
    }
    .role-card-content {
      padding: 1.5rem 1rem;
      text-align: center;
    }
    .role-card-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      background: var(--color-primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .role-card.selected .role-card-icon {
      color: var(--color-primary);
    }
    .role-card-title {
      font-weight: 700;
      color: var(--color-text-dark);
      margin-bottom: 0.25rem;
    }
    .role-card-desc {
      font-size: 0.85rem;
      color: var(--color-text-light);
    }
  </style>
</head>
<body>
<section class="section is-main">
  <div class="container">
    <!-- Шапка -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <i class="fas fa-building mr-2"></i>
          <strong>Образовательная платформа</strong>
        </a>
      </div>
    </nav>

    <!-- Форма регистрации -->
    <div class="form-card">
      <div class="has-text-centered mb-4">
        <i class="fas fa-user-plus" style="font-size: 2.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></i>
      </div>
      <h1 class="title has-text-centered">Регистрация</h1>
      <p class="subtitle has-text-centered has-text-grey" style="margin-bottom: 2rem;">Выберите тип аккаунта и заполните данные</p>
      
      {% if messages %}
        <div class="notification is-danger">
          <button class="delete"></button>
          {% for message in messages %}
            <p>{{ message.text }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="/register">
        <!-- Выбор роли -->
        <div class="field">
          <label class="label">Тип аккаунта</label>
          <div class="role-selector">
            <label class="role-card {{ 'selected' if role == 'student' or not role else '' }}">
              <input type="radio" name="role" value="student" {{ 'checked' if role == 'student' or not role else '' }} required>
              <div class="role-card-content">
                <i class="fas fa-user-graduate role-card-icon"></i>
                <p class="role-card-title">Студент</p>
                <p class="role-card-desc">Для учащихся</p>
              </div>
            </label>
            <label class="role-card {{ 'selected' if role == 'teacher' else '' }}">
              <input type="radio" name="role" value="teacher" {{ 'checked' if role == 'teacher' else '' }} required>
              <div class="role-card-content">
                <i class="fas fa-chalkboard-teacher role-card-icon"></i>
                <p class="role-card-title">Преподаватель</p>
                <p class="role-card-desc">Для преподавателей</p>
              </div>
            </label>
          </div>
        </div>

        <!-- Общие поля -->
        <div class="field">
          <label class="label">Имя</label>
          <div class="control has-icons-left">
            <input 
              class="input" 
              type="text" 
              name="first_name" 
              placeholder="Иван"
              value="{{ first_name or '' }}"
              required
            >
            <span class="icon is-small is-left">
              <i class="fas fa-user"></i>
            </span>
          </div>
        </div>

        <div class="field">
          <label class="label">Фамилия</label>
          <div class="control has-icons-left">
            <input 
              class="input" 
              type="text" 
              name="last_name" 
              placeholder="Петров"
              value="{{ last_name or '' }}"
              required
            >
            <span class="icon is-small is-left">
              <i class="fas fa-user"></i>
            </span>
          </div>
        </div>

        <div class="field">
          <label class="label">Email</label>
          <div class="control has-icons-left">
            <input 
              class="input" 
              type="email" 
              name="email" 
              placeholder="ivan.petrov@example.org"
              value="{{ email or '' }}"
              required
            >
            <span class="icon is-small is-left">
              <i class="fas fa-envelope"></i>
            </span>
          </div>
        </div>

        <!-- Поля для студента -->
        <div id="student-fields" class="role-specific-fields" style="display: none;">
          <div class="field">
            <label class="label">Группа</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select name="group_id">
                  <option value="">Выберите группу</option>
                  {% for group in groups %}
                    <option value="{{ group.id }}" {{ 'selected' if group_id == group.id else '' }}>
                      {{ group.name }} ({{ group.intake_year }})
                    </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Поля для преподавателя -->
        <div id="teacher-fields" class="role-specific-fields" style="display: none;">
          <div class="field">
            <label class="label">Код доступа</label>
            <div class="control">
              <input 
                class="input" 
                type="password" 
                name="access_code" 
                placeholder="Введите код доступа"
                value="{{ access_code or '' }}"
              >
            </div>
            <p class="help">Код доступа предоставляется администратором</p>
          </div>
        </div>

        <div class="field">
          <div class="control">
            <button type="submit" class="button is-primary is-fullwidth">
              <i class="fas fa-user-plus mr-2"></i>
              Зарегистрироваться
            </button>
          </div>
        </div>
      </form>

      <hr class="my-4">

      <div class="has-text-centered">
        <p class="has-text-grey" style="margin-bottom: 1rem;">
          <i class="fas fa-info-circle mr-1"></i>
          Уже есть аккаунт?
        </p>
        <p class="is-size-7">
          <a href="/login" class="has-text-primary">Вход как студент</a> • 
          <a href="/teacher-login" class="has-text-info">Вход как преподаватель</a>
        </p>
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Закрытие уведомлений
  (document.querySelectorAll('.notification .delete') || []).forEach(($delete) => {
    const $notification = $delete.parentNode;
    $delete.addEventListener('click', () => {
      $notification.parentNode.removeChild($notification);
    });
  });

  // Обработка выбора роли
  const roleRadios = document.querySelectorAll('input[name="role"]');
  const studentFields = document.getElementById('student-fields');
  const teacherFields = document.getElementById('teacher-fields');

  function updateRoleDisplay() {
    const selectedRole = document.querySelector('input[name="role"]:checked');
    if (selectedRole) {
      if (selectedRole.value === 'student') {
        studentFields.style.display = 'block';
        teacherFields.style.display = 'none';
      } else if (selectedRole.value === 'teacher') {
        studentFields.style.display = 'none';
        teacherFields.style.display = 'block';
      }
    }
  }

  roleRadios.forEach(radio => {
    radio.addEventListener('change', updateRoleDisplay);
  });

  // Инициализация
  updateRoleDisplay();

  // Обработка клика по карточкам ролей
  document.querySelectorAll('.role-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.type !== 'radio') {
        const radio = card.querySelector('input[type="radio"]');
        radio.checked = true;
        updateRoleDisplay();
      }
    });
  });
});
</script>
</body>
</html>
