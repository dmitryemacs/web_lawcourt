{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 class="title">Создание теста</h1>
    {% if messages %}
        {% for message in messages %}
            <div class="notification {{ message.category }}">
                {{ message.text }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" action="/tests/create">
        <div class="field">
            <label class="label">Курс</label>
            <div class="control">
                <div class="select">
                    <select name="course_id" required>
                        {% for course in courses %}
                        <option value="{{ course.id }}">
                            {{ course.subject.title }} ({{ course.semester }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="field">
            <label class="label">Название теста</label>
            <div class="control">
                <input class="input" type="text" name="name" required>
            </div>
        </div>

        <div class="field">
            <label class="label">Описание (опционально)</label>
            <div class="control">
                <textarea class="textarea" name="description"></textarea>
            </div>
        </div>

        <div class="field">
            <label class="label">Максимальный балл</label>
            <div class="control">
                <input class="input" type="number" name="max_score" value="100" min="1" max="1000">
            </div>
        </div>

        <div class="field">
            <label class="label">Лимит времени (минуты, опционально)</label>
            <div class="control">
                <input class="input" type="number" name="time_limit" min="1">
            </div>
        </div>

        <div class="field is-grouped">
            <div class="control">
                <button type="submit" class="button is-primary">Создать тест</button>
            </div>
            <div class="control">
                <a href="/tests" class="button is-light">Отмена</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
