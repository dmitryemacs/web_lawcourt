<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход преподавателя</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/modern.css">
</head>
<body>
<section class="section is-main">
  <div class="container">
    <!-- Шапка -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <i class="fas fa-building mr-2"></i>
          <strong>Образовательная платформа</strong>
        </a>
      </div>
    </nav>

    <!-- Форма входа -->
    <div class="form-card">
      <div class="has-text-centered mb-4">
        <i class="fas fa-chalkboard-teacher" style="font-size: 2.5rem; background: linear-gradient(135deg, #10b981 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></i>
      </div>
      <h1 class="title has-text-centered">Вход преподавателя</h1>
      <p class="subtitle has-text-centered has-text-grey" style="margin-bottom: 2rem;">
        Введите ваши учетные данные для входа
      </p>
      
      {% if messages %}
        <div class="notification is-danger">
          <button class="delete"></button>
          {% for message in messages %}
            <p><i class="fas fa-exclamation-circle mr-2"></i>{{ message.text }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="/teacher-login">
        <div class="field">
          <label class="label">Email преподавателя</label>
          <div class="control has-icons-left">
            <input 
              class="input" 
              type="email" 
              name="email" 
              placeholder="teacher@example.org"
              required
            >
            <span class="icon is-small is-left">
              <i class="fas fa-envelope"></i>
            </span>
          </div>
        </div>

        <div class="field">
          <label class="label">Код доступа</label>
          <div class="control has-icons-left">
            <input 
              class="input" 
              type="password" 
              name="access_code" 
              placeholder="Введите код доступа"
              required
            >
            <span class="icon is-small is-left">
              <i class="fas fa-lock"></i>
            </span>
          </div>
          <p class="help">Код доступа предоставляется администратором</p>
        </div>

        <div class="field mt-4">
          <div class="control">
            <button type="submit" class="button is-success is-fullwidth is-medium">
              <i class="fas fa-chalkboard-teacher mr-2"></i>
              Войти в систему
            </button>
          </div>
        </div>
      </form>

      <hr class="my-4">

      <div class="has-text-centered">
        <p class="has-text-grey" style="margin-bottom: 1rem;">
          <i class="fas fa-info-circle mr-1"></i>
          Вход для студентов
        </p>
        <p class="is-size-7">
          <a href="/login" class="has-text-primary">Вход как студент →</a>
        </p>
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Закрытие уведомлений
  (document.querySelectorAll('.notification .delete') || []).forEach(($delete) => {
    const $notification = $delete.parentNode;
    $delete.addEventListener('click', () => {
      $notification.parentNode.removeChild($notification);
    });
  });
});
</script>
</body>
</html>
